<div x-data="{ 
    darkMode: localStorage.getItem('theme') === 'dark', 
    show: false,
    activeText: 1 
    }" 
     x-init="
        $watch('darkMode', val => localStorage.setItem('theme', val ? 'dark' : 'light'));
        setTimeout(() => show = true, 100)
        setInterval(() => activeText = activeText === 1 ? 2 : 1, 2000);
     "
     :class="{ 'dark': darkMode }"
     class="relative flex items-center min-h-screen justify-center overflow-hidden bg-gons-background dark:bg-gons-background-dark text-gons-text dark:text-gons-text-dark transition-colors duration-500">
    
    <!-- Tombol Toggle -->
    <button @click="darkMode = !darkMode" class="absolute top-6 right-6 p-3 rounded-2xl bg-gons-secondary dark:bg-gons-secondary-dark hover:opacity-80 transition-all z-50 shadow-sm border border-gons-primary/10">
        <span class="flex items-center gap-2  text-sm">
            <span x-show="!darkMode">Dark Mode</span>
            <span x-show="darkMode">Light Mode</span>
        </span>
    </button>

    <div class="flex flex-col items-center text-center px-6" >
        
        <h1 x-show="show" 
            x-transition:enter="transition ease-out duration-700 transform"
            x-transition:enter-start="opacity-0 translate-y-10"
            x-transition:enter-end="opacity-100 translate-y-0"
            class="text-6xl md:text-8xl  tracking-tighter"> 
            Welcome To <span class="text-gons-primary underline decoration-gons-primary/20">Gons</span>
        </h1>

        <div x-show="show" 
             x-transition:enter="transition ease-out duration-1000 delay-300"
             x-transition:enter-start="opacity-0"
             x-transition:enter-end="opacity-100"
             class="relative mt-6 h-8 w-full flex justify-center items-center">
            
             
             <span x-show="activeText === 1" 
             x-transition:enter="transition ease-out duration-500"
             x-transition:enter-start="opacity-0 translate-y-2"
             x-transition:enter-end="opacity-100 translate-y-0"
                  x-transition:leave="transition ease-in duration-200"
                  x-transition:leave-start="opacity-100"
                  x-transition:leave-end="opacity-0"
                  class="absolute text-xl tracking-wide opacity-70 font-light"> 
                Standard Tailwind <span class="">v4 Styling</span>
            </span>

            <span x-show="activeText === 2" 
                  x-transition:enter="transition ease-out duration-500 delay-150"
                  x-transition:enter-start="opacity-0 translate-y-2"
                  x-transition:enter-end="opacity-100 translate-y-0"
                  x-transition:leave="transition ease-in duration-200"
                  x-transition:leave-start="opacity-100"
                  x-transition:leave-end="opacity-0"
                  class="absolute text-xl tracking-wide opacity-70 font-light">
                  Reactivity using <span class="">Alpine.js</span>
                </span>
        </div> 
    </div>
</div>
